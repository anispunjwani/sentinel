[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Start the API directly. Migrations are run as an explicit one-time step in the
# Railway shell (`alembic upgrade head`), NOT on boot: a blocked migration (e.g.
# lock contention from an overlapping zero-downtime deploy) would otherwise hang
# the whole service and fail the healthcheck. ${PORT:-8000} keeps it working
# whether or not Railway injects PORT.
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
